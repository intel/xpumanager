# @schema additionalProperties:false
image:
  # -- Image repository
  repository: ghcr.io/intel/xpumd/xpumd
  # @schema enum: [Always, IfNotPresent, Never]
  # -- Image pull policy
  pullPolicy: Always
  # -- Image tag, defaults to Chart.AppVersion
  tag: ""

# @schema $ref: $k8s/_definitions.json#/definitions/io.k8s.api.core.v1.PodSpec/properties/imagePullSecrets
# -- [Image pull secrets](https://kubernetes.io/docs/concepts/containers/images#specifying-imagepullsecrets-on-a-pod)
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the fully qualified app name
fullnameOverride: ""

# @schema additionalProperties:false
serviceAccount:
  # -- Create service account
  create: true
  # @schema $ref: $k8s/_definitions.json#/definitions/io.k8s.apimachinery.pkg.apis.meta.v1.ObjectMeta/properties/annotations
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use. If not specified and create is true, a name is generated using the fully qualified app name.
  name: ""

# @schema $ref: $k8s/_definitions.json#/definitions/io.k8s.apimachinery.pkg.apis.meta.v1.ObjectMeta/properties/annotations
# -- Annotations to add to the pod
podAnnotations: {}

# @schema $ref: $k8s/_definitions.json#/definitions/io.k8s.api.core.v1.PodSecurityContext
# -- [Pod security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod)
podSecurityContext:
  # @schema hidden
  seccompProfile:
    type: RuntimeDefault

# @schema $ref: $k8s/_definitions.json#/definitions/io.k8s.api.core.v1.SecurityContext
# -- [Container security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container)
securityContext:
  # @schema hidden
  runAsUser: 0
  # @schema hidden
  privileged: true
  # @schema hidden
  readOnlyRootFilesystem: true

# @schema additionalProperties:false
service:
  # -- Create service
  create: false
  # @schema enum: [ClusterIP, NodePort, LoadBalancer, ExternalName]
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 8080

# @schema $ref: $k8s/_definitions.json#/definitions/io.k8s.api.core.v1.ResourceRequirements
# -- [Resource requests and limits](https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/) of the container
resources:
  # @schema hidden
  limits:
    memory: 2Gi
  # @schema hidden
  requests:
    cpu: 10m
    memory: 128Mi

# @schema $ref: $k8s/_definitions.json#/definitions/io.k8s.api.core.v1.PodSpec/properties/nodeSelector
# -- Node selector for pod placement
nodeSelector: {}

# @schema $ref: $k8s/_definitions.json#/definitions/io.k8s.api.core.v1.PodSpec/properties/tolerations
# -- [Tolerations](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/) for the pods
tolerations: []

# @schema $ref: $k8s/_definitions.json#/definitions/io.k8s.api.core.v1.Affinity
# -- [Affinity](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity) for the pods
affinity: {}

# @schema additionalProperties:false
config:
  # -- Configuration for receivers (https://opentelemetry.io/docs/collector/configuration/#receivers)
  # @default --  
  # @section -- XPUM Daemon Configuration
  receivers:
    # @schema additionalProperties:false
    # -- Configuration for the Intel XPU receiver.
    # @default --  
    # @section -- XPUM Daemon Configuration
    intelxpu:
      # @schema enum: [debug, info, warn, error]
      # -- Log level (debug, info, warn, error)
      # @section -- XPUM Daemon Configuration
      log_level: info
      # -- Metrics data collection interval. Must be at least twice the sampling_interval.
      # @section -- XPUM Daemon Configuration
      collection_interval: 5s
      # -- Initial start delay for metrics collection, any non positive value is assumed to be immediately.
      # @section -- XPUM Daemon Configuration
      initial_delay: 1s
      # -- Metrics collection timeout.
      # @section -- XPUM Daemon Configuration
      timeout: 0
      # -- Sampling interval for the high-frequency metrics.
      # @section -- XPUM Daemon Configuration
      sampling_interval: 1s
      # -- Configuration for enabling/disabling individual metrics.
      # @section -- XPUM Daemon Configuration
      metrics: {}

  # -- Configuration for processors (https://opentelemetry.io/docs/collector/configuration/#processors)
  # @section -- XPUM Daemon Configuration
  processors:
    # -- Override configuration for the Intel XPU processor. Should only be used for advanced use cases. See `intelxpustatus` README for details.
    # @section -- XPUM Daemon Configuration
    intelxpustatus: {}

  # -- Configuration for exporters (https://opentelemetry.io/docs/collector/configuration/#exporters)
  # @default --  
  # @section -- XPUM Daemon Configuration
  exporters:
    # -- Configuration for the Intel XPU info exporter ([all available gRPC configuration settings](https://github.com/open-telemetry/opentelemetry-collector/blob/main/config/configgrpc/README.md)). Only unix domain socket endpoints are supported. If `endpoint` is unset, `$XDG_RUNTIME_DIR/intelxpuinfo.sock` is used instead.
    # @default --  
    # @section -- XPUM Daemon Configuration
    intelxpuinfo:
      endpoint: "/run/xpumd/intelxpuinfo.sock"

  # -- Configuration for extensions (https://opentelemetry.io/docs/collector/configuration/#extensions)
  # @section -- XPUM Daemon Configuration
  extensions: {}

  # -- Configuration for service (https://opentelemetry.io/docs/collector/configuration/#service)
  # @section -- XPUM Daemon Configuration
  service:
    telemetry:
      logs:
        level: info
        # TODO: enable before release
        #disable_stacktrace: true
    pipelines:
      metrics:
        receivers: [intelxpu]
        processors: [intelxpustatus]
        exporters: [intelxpuinfo]
