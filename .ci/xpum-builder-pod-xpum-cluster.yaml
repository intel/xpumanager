apiVersion: v1
kind: Pod
metadata:
  labels:
    worker: xpum-builder
  namespace: xpum-build-production-cluster
spec:
  tolerations:
  - key: jenkins-job-only
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    effect: NoSchedule
  containers:
    - args:
      - "99d"
      command:
        - "sleep"
      image: "gar-registry.caas.intel.com/xpum/xpum-builder-sles:lz-1.8.5-20250328"
      imagePullPolicy: "Always"
      name: "xpum-builder-sles"
      resources:
        requests:
          memory: "2Gi"
          cpu: "0.5"
        limits: 
          memory: "6Gi"
          cpu: "2"
      securityContext:
        privileged: false
      tty: false
      volumeMounts:
        - mountPath: "/home/jenkins/agent"
          name: "workspace-volume"
          readOnly: false
        - name: sign-secret
          mountPath: "/root"
          readOnly: true
        - mountPath: "/home/jenkins/jenkins-shared-pvc"
          name: "jenkins-shared-pvc"
          readOnly: false
      workingDir: "/home/jenkins/agent"
    - args:
        - "99d"
      command:
        - "sleep"
      image: "gar-registry.caas.intel.com/xpum/xpum-builder-ubuntu-jammy:lz-1.8.5-20250328"
      imagePullPolicy: "Always"
      name: "xpum-builder-ubuntu-jammy"
      resources:
        requests:
          memory: "2Gi"
          cpu: "0.5"
        limits: 
          memory: "6Gi"
          cpu: "2"
      securityContext:
        privileged: false
      tty: false
      volumeMounts:
        - mountPath: "/home/jenkins/agent"
          name: "workspace-volume"
          readOnly: false
        - name: sign-secret
          mountPath: "/root"
          readOnly: true
        - mountPath: "/home/jenkins/jenkins-shared-pvc"
          name: "jenkins-shared-pvc"
          readOnly: false
      workingDir: "/home/jenkins/agent"
    - args:
        - "99d"
      command:
        - "sleep"
      image: "gar-registry.caas.intel.com/xpum/xpum-builder-ubuntu-noble:lz-1.8.5-20250328"
      imagePullPolicy: "Always"
      name: "xpum-builder-ubuntu-noble"
      resources:
        requests:
          memory: "2Gi"
          cpu: "0.5"
        limits: 
          memory: "6Gi"
          cpu: "2"
      securityContext:
        privileged: false
      tty: false
      volumeMounts:
        - mountPath: "/home/jenkins/agent"
          name: "workspace-volume"
          readOnly: false
        - name: sign-secret
          mountPath: "/root"
          readOnly: true
        - mountPath: "/home/jenkins/jenkins-shared-pvc"
          name: "jenkins-shared-pvc"
          readOnly: false
      workingDir: "/home/jenkins/agent"
    - args:
        - "99d"
      command:
        - "sleep"
      image: "gar-registry.caas.intel.com/xpum/xpum-builder-debian:lz-1.8.5-20250328"
      imagePullPolicy: "Always"
      name: "xpum-builder-debian"
      resources:
        requests:
          memory: "2Gi"
          cpu: "0.5"
        limits: 
          memory: "6Gi"
          cpu: "2"
      securityContext:
        privileged: false
      tty: false
      volumeMounts:
        - mountPath: "/home/jenkins/agent"
          name: "workspace-volume"
          readOnly: false
        - name: sign-secret
          mountPath: "/root"
          readOnly: true
        - mountPath: "/home/jenkins/jenkins-shared-pvc"
          name: "jenkins-shared-pvc"
          readOnly: false
      workingDir: "/home/jenkins/agent"
    - args:
        - "99d"
      command:
        - "sleep"
      image: "gar-registry.caas.intel.com/xpum/xpum-builder-centos7-6:lz-1.8.5-20250328"
      imagePullPolicy: "Always"
      name: "xpum-builder-centos7-6"
      resources:
        requests:
          memory: "2Gi"
          cpu: "0.5"
        limits: 
          memory: "6Gi"
          cpu: "2"
      tty: false
      volumeMounts:
        - mountPath: "/home/jenkins/agent"
          name: "workspace-volume"
          readOnly: false
        - name: sign-secret
          mountPath: "/root"
          readOnly: true
        - mountPath: "/home/jenkins/jenkins-shared-pvc"
          name: "jenkins-shared-pvc"
          readOnly: false
      workingDir: "/home/jenkins/agent"
    - args:
        - "99d"
      command:
        - "sleep"
      image: "gar-registry.caas.intel.com/xpum/xpum-builder-centos8-2:lz-1.8.5-20250328"
      imagePullPolicy: "Always"
      name: "xpum-builder-centos8-2"
      resources:
        requests:
          memory: "2Gi"
          cpu: "0.5"
        limits: 
          memory: "6Gi"
          cpu: "2"
      tty: false
      volumeMounts:
        - mountPath: "/home/jenkins/agent"
          name: "workspace-volume"
          readOnly: false
        - name: sign-secret
          mountPath: "/root"
          readOnly: true
        - mountPath: "/home/jenkins/jenkins-shared-pvc"
          name: "jenkins-shared-pvc"
          readOnly: false
      workingDir: "/home/jenkins/agent"
    - args:
        - "99d"
      command:
        - "sleep"
      image: "gar-registry.caas.intel.com/xpum/xpum-builder-centos-stream9:lz-1.8.5-20250328"
      imagePullPolicy: "Always"
      name: "xpum-builder-centos-stream9"
      resources:
        requests:
          memory: "2Gi"
          cpu: "0.5"
        limits: 
          memory: "6Gi"
          cpu: "2"
      tty: false
      volumeMounts:
        - mountPath: "/home/jenkins/agent"
          name: "workspace-volume"
          readOnly: false
        - name: sign-secret
          mountPath: "/root"
          readOnly: true
        - mountPath: "/home/jenkins/jenkins-shared-pvc"
          name: "jenkins-shared-pvc"
          readOnly: false
      workingDir: "/home/jenkins/agent"
    - name: "kaniko-1"
      image: "gcr.io/kaniko-project/executor:v1.9.2-debug"
      imagePullPolicy: Always
      command:
      - /busybox/cat
      tty: true
      resources:
        requests:
          memory: "1Gi"
          cpu: "0.5"
        limits: 
          memory: "2Gi"
          cpu: "1"
      securityContext:
        privileged: false
      volumeMounts:
        - mountPath: "/home/jenkins/agent"
          name: "workspace-volume"
          readOnly: false
        - name: docker-config
          mountPath: /kaniko/.docker
      workingDir: "/home/jenkins/agent"
    - env:
        - name: "GIT_LFS_SKIP_SMUDGE"
          value: "1"
        - name: "GIT_TRACE"
          value: "0"
        - name: "GIT_CURL_VERBOSE"
          value: "0"
        - name: "JENKINS_AGENT_WORKDIR"
          value: "/home/jenkins/agent"
        - name: "HTTP_PROXY"
          value: "http://proxy-dmz.intel.com:912"
        - name: "HTTPS_PROXY"
          value: "http://proxy-dmz.intel.com:912"
        - name: "NO_PROXY"
          value: "*.intel.com"
        - name: "http_proxy"
          value: "http://proxy-dmz.intel.com:912"
        - name: "https_proxy"
          value: "http://proxy-dmz.intel.com:912"
        - name: "no_proxy"
          value: "*.intel.com"
      image: "jenkins/inbound-agent:latest-jdk17"
      name: "jnlp"
      resources:
        requests:
          memory: "1Gi"
          cpu: "0.5"
        limits: 
          memory: "2Gi"
          cpu: "1"
      volumeMounts:
        - mountPath: "/home/jenkins/agent"
          name: "workspace-volume"
          readOnly: false
  hostNetwork: false
  nodeSelector:
    kubernetes.io/os: "linux"
  restartPolicy: "Never"
  volumes:
    - emptyDir:
        medium: ""
      name: workspace-volume
    - name: jenkins-shared-pvc
      persistentVolumeClaim:
        claimName: xpum-cluster-jenkins-share
    - name: docker-config
      projected:
        sources:
        - secret:
            name: regcre-gar-registry-caas-intel-com
            items:
              - key: .dockerconfigjson
                path: config.json
    - name: sign-secret
      secret:
        secretName: sign-secret
        items:
          - key: password
            path: password.sys_xpum