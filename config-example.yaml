receivers:
  # The Intel XPU receiver.
  intelxpu:
    # Log level (debug, info, warn, error)
    log_level: info
    # Metrics data collection interval.
    # Must be at least twice the sampling_interval.
    collection_interval: 30s
    # Initial start delay for metrics collection, any non positive value is assumed to be immediately.
    initial_delay: 1s
    # Metrics collection timeout.
    timeout: 0
    # Sampling interval for the high-frequency metrics.
    sampling_interval: 1s
    # Configuration for enabling/disabling individual metrics.
    # See receiver/intelxpu/documentation.md for list of available metrics.
    metrics:
#      hw.memory.size:
#        enabled: false


exporters:
  prometheus:
    endpoint: "0.0.0.0:8080"

processors:

extensions:

service:
  pipelines:
    metrics:
      receivers: [intelxpu]
      exporters: [prometheus]
