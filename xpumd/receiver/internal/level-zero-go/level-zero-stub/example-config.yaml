            zesFabricPortGetLinkType: 0
            zesFabricPortGetConfig: 0
            zesFabricPortGetState: 0
            zesFabricPortGetThroughput: 0
            zesFabricPortGetFabricErrorCounters: 0

        # -----------------------------------------------------------------
        # Fans (zesDeviceEnumFans)
        # -----------------------------------------------------------------
        Fans:
        - # zesFanGetProperties (nullable)
          Properties:
            OnSubdevice: false
            SubdeviceId: 0
            CanControl: true
            SupportedModes: 7  # ZE_BIT(ZES_FAN_SPEED_MODE_DEFAULT) | ZE_BIT(ZES_FAN_SPEED_MODE_FIXED) | ZE_BIT(ZES_FAN_SPEED_MODE_TABLE)
