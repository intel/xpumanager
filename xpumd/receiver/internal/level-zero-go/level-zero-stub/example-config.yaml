          Properties:
            Type: 0  # ZES_ENGINE_GROUP_ALL
            OnSubdevice: false
            SubdeviceId: 0
            ExtendedProperties:
              CountOfVirtualFunctionInstance: 4
          # zesEngineGetActivity
          Activity:
            ActiveTime: 12345678
            Timestamp: 87654321
          # zesEngineGetActivityExt
          ActivityExt:
          - ActiveTime: 11111111
            Timestamp: 22222222
          - ActiveTime: 33333333
            Timestamp: 44444444
          ReturnValues:
            zesEngineGetProperties: 0
            zesEngineGetActivity: 0

        # -----------------------------------------------------------------
        # Fabric ports (zesDeviceEnumFabricPorts)
        # -----------------------------------------------------------------
        FabricPorts:
        - # zesFabricPortGetProperties (nullable)
          Properties:
            Model: Xe-Link
            OnSubdevice: false
            SubdeviceId: 0
            PortId:
              FabricId: 1
              AttachId: 2
              PortNumber: 3
            MaxRxSpeed:
              BitRate: 53125000000
              Width: 4
            MaxTxSpeed:
              BitRate: 53125000000
              Width: 4
          # zesFabricPortGetLinkType (nullable)
          LinkType:
            Desc: Xe-Link
          # zesFabricPortGetConfig (nullable)
