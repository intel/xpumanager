            Enabled: true
            Beaconing: false
          # zesFabricPortGetState (nullable)
          State:
            Status: 1  # ZES_FABRIC_PORT_STATUS_HEALTHY
            QualityIssues: 0
            FailureReasons: 0
            RemotePortId:
              FabricId: 4
              AttachId: 5
              PortNumber: 6
            RxSpeed:
              BitRate: 53125000000
              Width: 4
            TxSpeed:
              BitRate: 53125000000
              Width: 4
          # zesFabricPortGetThroughput (nullable)
