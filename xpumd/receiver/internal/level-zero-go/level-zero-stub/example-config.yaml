#
# Example stub configuration file.
#
# This file documents every supported field. All fields are optional, unset
# fields default to their zero value.
#
# Nullable fields: related functions return ZE_RESULT_ERROR_UNSUPPORTED_FEATURE
# when set to "null" (or when not specified).

# -----------------------------------------------------------------------
# Drivers
# -----------------------------------------------------------------------
# zesDriverGet
Drivers:
  - # Per-driver extension properties returned by
    # zesDriverGetExtensionProperties.
    ExtensionProperties:
      - Name: "ZES_extension_power_limits"
        Version: 65536
      - Name: "ZES_extension_device_ecc_default_properties"
        Version: 65536
      - Name: "ZES_extension_engine_activity"
        Version: 65536

    # Function-level return-value overrides for driver-scoped calls.
    # Set a non-zero ze_result_t value to inject an error.
    ReturnValues:
      zesDriverGetExtensionProperties: 0
      zesDeviceGet: 0
      zesDriverEventListen: 0
      zesDriverEventListenEx: 0

    # List of features that return ZE_RESULT_ERROR_UNSUPPORTED_FEATURE.
    # Takes precedence over ReturnValues.
    UnsupportedFeatures:
    #   - GetExtensionProperties
    #   - Driver.DeviceGet
    #   - Driver.EventListen
    #   - Driver.EventListenEx

    # -------------------------------------------------------------------
    # Devices
    # -------------------------------------------------------------------
    # zesDeviceGet
    Devices:
      - # zesDeviceGetProperties (nullable)
        Properties:
          Core:
            Type: 1  # ZE_DEVICE_TYPE_GPU
            VendorId: 32902
            DeviceId: 3029
            Flags: 1  # ZE_DEVICE_PROPERTY_FLAG_INTEGRATED
            SubdeviceId: 0
            CoreClockRate: 1600
            MaxMemAllocSize: 17179869184
            MaxHardwareContexts: 256
            MaxCommandQueuePriority: 0
            NumThreadsPerEU: 8
            PhysicalEUSimdWidth: 8
            NumEUsPerSubslice: 16
            NumSubslicesPerSlice: 8
            NumSlices: 1
            TimerResolution: 100
            TimestampValidBits: 36
            KernelTimestampValidBits: 32
            Uuid:
              Id: "12345678-000a-00b0-0c00-00000000d00e"
            Name: "ACME GPU"
          NumSubdevices: 2
          SerialNumber: "SN-0001"
          BoardNumber: "BOARD-0001"
          BrandName: "ACME"
          ModelName: "Max 1550"
          VendorName: "ACME Inc."
          DriverVersion: "1.0.0"
          Uuid:
            Id: "12345678-000a-00b0-0c00-00000000d000"
          Type: 1  # ZES_DEVICE_TYPE_GPU
          Flags: 1  # ZES_DEVICE_PROPERTY_FLAG_INTEGRATED

        # zesDeviceGetState (nullable)
        State:
          Reset: 0
          Repaired: 1  # ZES_REPAIR_STATUS_NOT_PERFORMED

        # PCI info
        PCI:
          # zesDevicePciGetProperties (nullable)
          Properties:
            Address:
              Domain: 0
              Bus: 5
              Device: 0
              Function: 0
            MaxSpeed:
              Gen: 4
              Width: 16
              MaxBandwidth: 0
            HaveBandwidthCounters: true
            HavePacketCounters: true
            HaveReplayCounters: true
            # Extended properties for ZES_extension_pci_link_speed_downgrade
            LinkSpeedDowngrade:
              PciLinkSpeedUpdateCapable: true
              MaxPciGenSupported: 4
          # zesDevicePciGetState (nullable)
          State:
            Status: 1  # ZES_PCI_LINK_STATUS_GOOD
            QualityIssues: 0
            StabilityIssues: 0
            Speed:
              Gen: 4
              Width: 16
              MaxBandwidth: 0
            # Extended state for ZES_extension_pci_link_speed_downgrade
            LinkSpeedDowngrade:
              PciLinkSpeedDowngradeStatus: false
          # zesDevicePciGetBars
          Bars:
            - Type: 0  # ZES_PCI_BAR_TYPE_MMIO
              Index: 0
              Base: 2147483648
              Size: 16777216
            - Type: 2  # ZES_PCI_BAR_TYPE_MEM
              Index: 2
              Base: 4294967296
              Size: 268435456
          # zesDevicePciGetStats (nullable)
          Stats:
            RxCounter: 1000000
            TxCounter: 2000000
            PacketCounter: 0
            ReplayCounter: 0
            Timestamp: 999999
            Speed:
              Gen: 4
              Width: 16
              MaxBandwidth: 0
          # zesDevicePciLinkSpeedUpdateExt: pending action to return.
          PciLinkSpeedUpdatePendingAction: 0  # ZES_DEVICE_ACTION_NONE

        # ECC info
        ECC:
          # zesDeviceEccAvailable
          Available: true
          # zesDeviceEccConfigurable
          Configurable: true
          # zesDeviceGetEccState (nullable)
          State:
            CurrentState: 1  # ZES_DEVICE_ECC_STATE_ENABLED
            PendingState: 1  # ZES_DEVICE_ECC_STATE_ENABLED
            PendingAction: 0  # ZES_DEVICE_ACTION_NONE
            ExtendedProperties:
              DefaultState: 1  # ZES_DEVICE_ECC_STATE_ENABLED

        # Overclock info (nullable)
        Overclock:
          # zesDeviceGetOverclockDomains
          DomainsBitmask: 3  # ZES_OVERCLOCK_DOMAIN_CARD | ZES_OVERCLOCK_DOMAIN_PACKAGE
          # zesDeviceGetOverclockControls
          Controls:
            - DomainType: 1  # ZES_ZES_OVERCLOCK_DOMAIN_CARD
              ControlsBitmask: 7  # ZES_OVERCLOCK_CONTROL_VF | ZES_OVERCLOCK_CONTROL_FREQ_OFFSET | ZES_OVERCLOCK_CONTROL_VMAX_OFFSET
            - DomainType: 2  # ZES_ZES_OVERCLOCK_DOMAIN_PACKAGE
              ControlsBitmask: 7  # ZES_OVERCLOCK_CONTROL_VF | ZES_OVERCLOCK_CONTROL_FREQ_OFFSET | ZES_OVERCLOCK_CONTROL_VMAX_OFFSET
          # zesDeviceReadOverclockState (nullable)
          State:
            Mode: 3  # ZES_OVERCLOCK_MODE_MODE_ON
            WaiverSetting: true
            State: false
            PendingAction: 0  # ZES_PENDING_ACTION_PENDING_NONE
            PendingReset: false
          # ---------------------------------------------------------------
          # OverclockDomains (zesDeviceEnumOverclockDomains)
          # ---------------------------------------------------------------
          Domains:
            - # zesOverclockGetDomainProperties (nullable)
              Properties:
                DomainType: 1  # ZES_OVERCLOCK_DOMAIN_CARD
                AvailableControls: 3  # ZES_OVERCLOCK_CONTROL_VF | ZES_OVERCLOCK_CONTROL_FREQ_OFFSET
                VFProgramType: 0  # ZES_VF_PROGRAM_TYPE_VF_ARBITRARY
                NumberOfVFPoints: 16
              # zesOverclockGetDomainVFProperties (nullable)
              VFProperties:
                MinFreq: 300
                MaxFreq: 1600
                StepFreq: 25
                MinVolt: 700
                MaxVolt: 1200
                StepVolt: 10
              # Per-control info: zesOverclockGetDomainControlProperties,
              # zesOverclockGetControlCurrentValue, zesOverclockGetControlPendingValue,
              # zesOverclockGetControlState (each field nullable individually)
              ControlInfos:
                - ControlType: 1  # ZES_OVERCLOCK_CONTROL_VF
                  Properties:
                    MinValue: 100
                    MaxValue: 2000
                    StepValue: 50
                    RefValue: 900
                    DefaultValue: 1100
                  CurrentValue: 1200
                  PendingValue: 1100
                  State: 2  # ZES_CONTROL_STATE_STATE_ACTIVE
                  PendingAction: 0  # ZES_PENDING_ACTION_PENDING_NONE
                - ControlType: 2  # ZES_OVERCLOCK_CONTROL_FREQ_OFFSET
                  Properties:
                    MinValue: 200
                    MaxValue: 3000
                    StepValue: 50
                    RefValue: 900
                    DefaultValue: 1100
                  CurrentValue: 1200
                  PendingValue: 1100
                  State: 3  # ZES_CONTROL_STATE_STATE_DISABLED
                  PendingAction: 0  # ZES_PENDING_ACTION_PENDING_NONE
              # zesOverclockGetVFPointValues
              VfPointValue: 42

        # zesDeviceProcessesGetState
        Processes:
          - ProcessId: 1234
            MemSize: 1073741824
            SharedSize: 0
            Engines: 7  # ZES_ENGINE_TYPE_FLAG_OTHER | ZES_ENGINE_TYPE_FLAG_COMPUTE | ZES_ENGINE_TYPE_FLAG_3D
          - ProcessId: 5678
            MemSize: 536870912
            SharedSize: 134217728
            Engines: 2  # ZES_ENGINE_TYPE_FLAG_COMPUTE

        # zesDriverEventListen / zesDriverEventListenEx (0 == no pending events)
        Events: 1  # ZES_EVENT_TYPE_FLAG_DEVICE_DETACH

        # Function-level return-value overrides for device-scoped calls.
        ReturnValues:
          zesDeviceGetProperties: 0
          zesDeviceGetState: 0
          zesDevicePciGetProperties: 0
          zesDevicePciGetState: 0
          zesDevicePciGetStats: 0
          zesDevicePciLinkSpeedUpdateExt: 0
          zesDevicePciGetBars: 0
          zesDeviceGetEccState: 0
          zesDeviceSetEccState: 0
          zesDeviceEventRegister: 0
          zesDeviceEnumEngineGroups: 0
          zesDeviceEnumFabricPorts: 0
          zesDeviceEnumFans: 0
          zesDeviceEnumFirmwares: 0
          zesDeviceEnumFrequencyDomains: 0
          zesDeviceEnumLeds: 0
          zesDeviceEnumMemoryModules: 0
          zesDeviceEnumOverclockDomains: 0
          zesDeviceEnumPerformanceFactorDomains: 0
          zesDeviceEnumPowerDomains: 0
          zesDeviceEnumPsus: 0
          zesDeviceEnumRasErrorSets: 0
          zesDeviceEnumSchedulers: 0
          zesDeviceEnumStandbyDomains: 0
          zesDeviceEnumTemperatureSensors: 0
          zesDeviceEnumDiagnosticTestSuites: 0

        # List of features that return ZE_RESULT_ERROR_UNSUPPORTED_FEATURE.
        # Takes precedence over ReturnValues.
        UnsupportedFeatures:
        #   - Device.GetProperties
        #   - Device.GetState
        #   - Device.ProcessesGetState
        #   - Device.Reset
        #   - Device.ResetExt
        #   - Device.SetOverclockWaiver
        #   - Device.GetOverclockControls
        #   - Device.EventRegister
        #   - PCI.GetProperties
        #   - PCI.GetState
        #   - PCI.GetBars
        #   - PCI.GetStats
        #   - OverclockDomains
        #   - Overclock.ReadState
        #   - Overclock.EnumDomains
        #   - Overclock.ResetSettings
        #   - OverclockDomain.GetProperties
        #   - OverclockDomain.GetVFProperties
        #   - OverclockDomain.GetDomainControlProperties
        #   - OverclockDomain.GetControlCurrentValue
        #   - OverclockDomain.GetControlPendingValue
        #   - OverclockDomain.SetControlUserValue
        #   - OverclockDomain.GetControlState
        #   - OverclockDomain.GetVFPointValues
        #   - OverclockDomain.SetVFPointValues
        #   - ECC
        #   - ECC.Configurable
        #   - ECC.GetState
        #   - ECC.SetState
        #   - DiagnosticsTestSuites
        #   - Diagnostic.GetProperties
        #   - Diagnostic.GetTests
        #   - Diagnostic.RunTests
        #   - EngineGroups
        #   - EngineGroup.GetProperties
        #   - EngineGroup.GetActivity
        #   - EngineGroup.GetActivityExt
        #   - FabricPorts
        #   - FabricPort.GetProperties
        #   - FabricPort.GetLinkType
        #   - FabricPort.GetConfig
        #   - FabricPort.SetConfig
        #   - FabricPort.GetState
        #   - FabricPort.GetThroughput
        #   - FabricPort.GetErrorCounters
        #   - FabricPort.GetMultiPortThroughput
        #   - Fans
        #   - Fan.GetProperties
        #   - Fan.GetConfig
        #   - Fan.SetDefaultMode
        #   - Fan.SetFixedSpeedMode
        #   - Fan.SetSpeedTableMode
        #   - Fan.GetState
        #   - Firmwares
        #   - Firmware.GetProperties
        #   - Firmware.Flash
        #   - Firmware.GetFlashProgress
        #   - Firmware.GetConsoleLogs
        #   - FrequencyDomains
        #   - FrequencyDomain.GetProperties
        #   - FrequencyDomain.GetAvailableClocks
        #   - FrequencyDomain.GetRange
        #   - FrequencyDomain.SetRange
        #   - FrequencyDomain.GetState
        #   - FrequencyDomain.GetThrottleTime
        #   - Leds
        #   - Led.GetProperties
        #   - Led.GetState
        #   - Led.SetState
        #   - Led.SetColor
        #   - MemoryModules
        #   - MemoryModule.GetProperties
        #   - MemoryModule.GetState
        #   - MemoryModule.GetBandwidth
        #   - PerformanceDomains
        #   - PerformanceDomain.GetProperties
        #   - PerformanceDomain.GetConfig
        #   - PerformanceDomain.SetConfig
        #   - PowerDomains
        #   - PowerDomain.GetProperties
        #   - PowerDomain.GetEnergyCounter
        #   - PowerDomain.GetLimitsExt
        #   - PowerDomain.SetLimitsExt
        #   - PowerDomain.GetEnergyThreshold
        #   - PowerDomain.SetEnergyThreshold
        #   - Psus
        #   - Psu.GetProperties
        #   - Psu.GetState
        #   - RasErrorSets
        #   - RasErrorSet.GetProperties
        #   - RasErrorSet.GetConfig
        #   - RasErrorSet.SetConfig
        #   - RasErrorSet.GetState
        #   - Schedulers
        #   - Scheduler.GetProperties
        #   - Scheduler.GetCurrentMode
        #   - Scheduler.GetTimeoutModeProperties
        #   - Scheduler.GetTimesliceModeProperties
        #   - Scheduler.SetTimeoutMode
        #   - Scheduler.SetTimesliceMode
        #   - Scheduler.SetExclusiveMode
        #   - StandbyDomains
