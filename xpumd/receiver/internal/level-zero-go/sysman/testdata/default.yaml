              HaveRGB: false

        MemoryModules:
          - Properties:
              Type: 0 # ZES_MEM_TYPE_HBM
              Location: 1 # ZES_MEM_LOC_DEVICE
              OnSubdevice: true
              SubdeviceId: 1
              PhysicalSize: 17179869184 # 16 GiB
              BusWidth: 128
              NumChannels: 8
            State:
              Health: 1 # ZES_MEM_HEALTH_OK
              Free: 8589934592 # 8 GiB
              Size: 17179869184 # 16 GiB
            Bandwidth:
