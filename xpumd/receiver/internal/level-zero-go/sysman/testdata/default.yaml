            Throughput:
              Timestamp: 777777
              RxCounter: 111111
              TxCounter: 222222
            ErrorCounters:
              LinkFailureCount: 5
              FwCommErrorCount: 6
              FwErrorCount: 7
              LinkDegradeCount: 8
          - Properties:
