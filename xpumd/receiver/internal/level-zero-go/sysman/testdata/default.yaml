          Domains:
            - Properties:
                DomainType: 1 # ZES_OVERCLOCK_DOMAIN_CARD
                AvailableControls: 3 # OVERCLOCK_CONTROL_VF | OVERCLOCK_CONTROL_FREQ_OFFSET
                VFProgramType: 0 # ZES_VF_PROGRAM_TYPE_VF_ARBITRARY
