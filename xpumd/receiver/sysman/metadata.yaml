# https://github.com/open-telemetry/opentelemetry-collector/blob/main/cmd/mdatagen/metadata-schema.yaml
type: sysman

status:
  class: scraper
  stability:
    development: [metrics, logs]
  codeowners:
    active: [marquiz, eero-t]

sem_conv_version: 1.38.0

attributes:
  aggregation:
    description: Aggregation type for the metric.
    type: string
    enum:
      - min
      - max
      - avg
  com.intel.power.limit.level:
    # TODO: or "hw.power.limit.level"?
    description: For which period / duration power limit applies.
    type: string
  com.intel.power.limit.source:
    # TODO: or "hw.power.limit.source"?
    description: In which device state power limit applies (e.g. AC, DC, when battery powered).
    type: string
  com.intel.speed.throttle_reason:
    description: Reason for the hardware component speed throttling.
    type: string
  com.intel.subdevice_count:
    description: Number of GPU sub-devices.
    type: int
  com.intel.subdevice_id:
    description: Sub-device ID of the hardware component.
    type: string
  error.category:
    description: Error category.
    type: string
  error.type:
    description: Error type.
    type: string
    enum:
      - correctable
      - uncorrectable
  hw.firmware_version:
    description: Firmware version of the hardware component. Comma-separated list of `<id>:<name>:<subdevice_id>:<version>`, where `<version>` is URL-encoded.
    type: string
  hw.frequency.domain:
    description: The frequency domain (gpu, memory, media...).
    type: string
  hw.gpu.task:
    description: GPU engine / task type.
    type: string
  hw.gpu.type:
    description: GPU device type.
    type: string
    enum:
      - discrete
      - integrated
      - subdevice
  hw.id:
    description: Unique identifier for the hardware component.
    type: string
  hw.limit_type:
    description: Type of limit.
    type: string
  hw.memory.demand_paging:
    description: Whether device supports on-demand memory page-faulting.
    type: bool
  hw.memory.ecc:
    description: Device memory ECC support status. If ECC is configurable, `hw.status` metric tells whether it is enabled.
    type: string
    enum:
      - available
      - configurable
      - unavailable
      - unknown
  hw.memory.location:
    description: Location of the memory (device, system...).
    type: string
  hw.memory.type:
    description: Type of the memory.
    type: string
  hw.model:
    description: Model name of the hardware component.
    type: string
  hw.name:
    description: An easily-recognizable name for the hardware component.
    type: string
  hw.sensor_location:
    description: Location of the sensor.
    type: string
  hw.serial_number:
    description: Serial number of the hardware component.
    type: string
  hw.state:
    description: Current state of the hardware component.
    type: string
  hw.type:
    description: Type of the hardware component.
    type: string
    enum:
      - frequency
      - gpu
      - memory
      - pci_link
  hw.vendor:
    description: Vendor name of the hardware component.
    type: string
  network.io.direction:
    description: The IO operation direction.
    type: string
    enum:
      - receive
      - transmit
  pci.bdf:
    description: PCI BDF (`<domain>:<bus>:<device>.<function>`) for the device.
    type: string
  pci.device_id:
    description: PCI device ID of the device.
    type: string
  pci.lanes:
    description: The number of PCI lanes.
    type: string
  pci.link_gen:
    description: PCI link generation.
    type: string
  pci.vendor_id:
    description: PCI vendor ID of the device.
    type: string
  sample.status:
    description: Status of the samples.
    type: string
    enum:
      - collected
      - dropped
  statistic:
    description: Statistic type for the metric.
    type: string
    enum:
      - min
      - max

metrics:
  hw.energy:
    enabled: true
    description: Energy consumed by the hardware component.
    stability: development
    unit: "J"
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.sensor_location]
  hw.errors:
    enabled: true
    description: Number of GPU errors. Correctable `error.type` error metrics are reported only when non-zero.
    stability: development
    unit: "{error}"
    sum:
      value_type: int
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.type, error.type, error.category]
  hw.frequency:
    enabled: true
    description: Operating frequency of the hardware component.
    stability: development
    unit: "Hz"
    gauge:
      value_type: int
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.frequency.domain, aggregation]
  hw.frequency.limit:
    enabled: true
    description: Frequency limit in Hertz.
    stability: development
    unit: "Hz"
    gauge:
      value_type: int
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.frequency.domain, hw.limit_type]
  hw.frequency.request:
    enabled: true
    description: Requested operating frequency.
    stability: development
    unit: "Hz"
    gauge:
      value_type: int
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.frequency.domain]
  hw.frequency.samples:
    enabled: true
    description: Number of frequency samples during the last collection interval.
    stability: development
    unit: "{count}"
    gauge:
      value_type: int
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.frequency.domain, sample.status]
  hw.frequency.throttle_status:
    enabled: true
    description: Hardware component frequency throttle status.
    stability: development
    unit: "1"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.frequency.domain, com.intel.speed.throttle_reason]
  hw.gpu.bandwidth.limit:
    enabled: true
    description: Maximum (read+write) PCI bandwidth in bytes/sec for the GPU device.
    stability: development
    unit: "By/s"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, pci.bdf]
  hw.gpu.bandwidth.utilization:
    enabled: true
    description: GPU device (read+write) PCI bandwidth utilization ratio.
    stability: development
    unit: "1"
    gauge:
      value_type: double
    attributes: [hw.id, hw.name, pci.bdf]
  hw.gpu.info:
    enabled: true
    description: Information about the GPU device.
    stability: development
    unit: "1"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, pci.bdf, pci.vendor_id, pci.device_id, hw.model, hw.serial_number, hw.vendor, hw.firmware_version, hw.gpu.type, com.intel.subdevice_count, pci.lanes, pci.link_gen, hw.memory.demand_paging, hw.memory.ecc]
  hw.gpu.io:
    enabled: true
    description: Bytes received / transmitted over PCI bus by the GPU device.
    stability: development
    unit: "By"
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, pci.bdf, network.io.direction]
  hw.gpu.io.rate:
    # TODO: disable/drop this if limits are available on all relevant HW
    enabled: true
    description: Current (read+write) PCI bandwidth usage in bytes/sec for the GPU device.
    stability: development
    unit: "By/s"
    gauge:
      value_type: double
    attributes: [hw.id, hw.name, pci.bdf]
  hw.gpu.utilization:
    enabled: true
    description: GPU engine / task pipeline utilization ratio.
    stability: development
    unit: "1"
    gauge:
      value_type: double
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.gpu.task]
  hw.memory.bandwidth.limit:
    enabled: true
    description: Maximum total memory (read+write) bandwidth in bytes/sec.
    stability: development
    unit: "By/s"
    sum:
      value_type: double
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.memory.location, hw.memory.type]
  hw.memory.bandwidth.utilization:
    enabled: true
    description: Memory bandwidth (read+write) utilization ratio.
    stability: development
    unit: "1"
    gauge:
      value_type: double
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.memory.location, hw.memory.type]
  hw.memory.free:
    enabled: true
    description: Free memory. Reported only when `hw.memory.size` (and memory usage metrics) are unavailable.
    stability: development
    unit: "By"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.memory.location, hw.memory.type]
  hw.memory.io:
    enabled: true
    description: Bytes read from / written to memory.
    stability: development
    unit: "By"
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.memory.location, hw.memory.type, network.io.direction]
  hw.memory.io.rate:
    # TODO: disable/drop this if limits are available on all relevant HW
    enabled: true
    description: Current memory bandwidth (read+write) usage in bytes/sec.
    stability: development
    unit: "By/s"
    gauge:
      value_type: double
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.memory.location, hw.memory.type]
  hw.memory.size:
    enabled: true
    description: Physical size of the memory.
    stability: development
    unit: "By"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.memory.location, hw.memory.type]
  hw.memory.usage:
    enabled: true
    description: Memory used.
    stability: development
    unit: "By"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.memory.location, hw.memory.type]
  hw.memory.utilization:
    enabled: true
    description: Memory utilization ratio.
    stability: development
    unit: "1"
    gauge:
      value_type: double
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.memory.location, hw.memory.type]
  hw.power:
    enabled: true
    description: Instantaneous power usage of the hardware component.
    stability: development
    unit: "W"
    gauge:
      value_type: double
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.sensor_location]
  hw.power.limit:
    enabled: true
    description: Power usage limit for the hardware component.
    stability: development
    unit: "W"
    gauge:
      value_type: double
    # TODO: attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.sensor_location, hw.power.limit.level, hw.power.limit.source]
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.sensor_location, com.intel.power.limit.level, com.intel.power.limit.source]
  hw.status:
    enabled: true
    description: Known hardware component states. Problem state reporting starts after issue becomes known / active for the first time (to greatly reduce number of state metrics). Unknown state is reported only if state was known before.
    stability: development
    unit: "1"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.state, hw.type]
  hw.temperature:
    enabled: true
    description: Temperature of the hardware component in degrees Celsius.
    stability: development
    unit: "Cel"
    gauge:
      value_type: double
    attributes: [hw.id, hw.name, pci.bdf, com.intel.subdevice_id, hw.sensor_location, statistic]

tests:
  # TODO: explore using a stub l0 driver for enabling lifecycle tests (for
  # environment without real target hardware)
  skip_lifecycle: true
  skip_shutdown: true
