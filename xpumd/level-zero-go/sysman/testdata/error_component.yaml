# Error stub: component method failures (DriverGet + DeviceGet + all Enum* succeed,
# component methods fail, ZE_RESULT_ERROR_NOT_AVAILABLE = 0x70010001).
# Used by all component-level method tests (Engine, FabricPort,
# Fan, Firmware, Frequency, Led, Memory, Overclock, Performance, Power, Psu, Ras,
# Scheduler, Standby, Temperature, Diagnostics) and FabricPortGetMultiPortThroughput.

