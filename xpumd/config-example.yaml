receivers:
  # The Intel XPU receiver.
  intelxpu:
    # Metrics data collection interval.
    # Must be at least twice the sampling_interval.
    collection_interval: 5s
    # Initial start delay for metrics collection, any non positive value is assumed to be immediately.
    initial_delay: 1s
    # Metrics collection timeout.
    timeout: 0
    # Sampling interval for the high-frequency metrics.
    sampling_interval: 1s
    # Configuration for enabling/disabling individual metrics.
    # See receiver/intelxpu/sysman/documentation.md for list of available metrics.
    metrics:
#      hw.memory.size:
#        enabled: false

  intel_crashlog:
    # Directory to watch for new crashlog files (must exist!).
    directory: /var/log/crashlog
    # Filename glob pattern (matched against the base name of each file).
    glob: "*.bin"
    # Ignore files whose modification time is older than this duration before
    # startup. Zero means only files created after startup are processed.
    ignore_older_than: 0s
    # Static attributes added to every emitted log record (optional).
    # add_attributes:
    #   hw.vendor: "ACME"

processors:
  intelxpustatus:
    rules:
      - name: "Intel GPU core temperature health"
        source_metric: "hw.temperature"
        parent_metric: "hw.gpu.info"
        parent_ref_attribute: "hw.id"
        parent_filters:
          - key: "pci.vendor_id"
            values: ["8086"]
        component_filters:
          - key: "hw.sensor_location"
            values: ["gpu"]
        copy_attributes: ["hw.id", "hw.name", "pci.bdf", "hw.sensor_location", "com.intel.subdevice_id"]
        add_attributes:
          hw.type: "temperature"
        # Ordered list of state rules. The rules should be ordered by increasing severity.
        # All rules are evaluated, the last matching one will be active.
        states:
          # Default state
          - state_name: "ok"
          - state_name: "warning"
            conditions:
              - value: 95.0
                parent_filters:
                  - key: "pci.device_id"
                    values: ["56c1"]
              - value: 100.0
                parent_filters:
                  - key: "pci.device_id"
                    values: ["56c0", "56c2"]
              # Default threshold for other device IDs
              - value: 105.0
      - name: "Intel GPU memory temperature health"
        source_metric: "hw.temperature"
        parent_metric: "hw.gpu.info"
        parent_ref_attribute: "hw.id"
        parent_filters:
          - key: "pci.vendor_id"
            values: ["8086"]
        component_filters:
          - key: "hw.sensor_location"
            values: ["memory"]
        copy_attributes: ["hw.id", "hw.name", "pci.bdf", "hw.sensor_location", "com.intel.subdevice_id"]
        add_attributes:
          hw.type: "temperature"
        # Ordered list of state rules. The rules should be ordered by increasing severity.
        # All rules are evaluated, the last matching one will be active.
        states:
          # Default state
          - state_name: "ok"
          - state_name: "warning"
            conditions:
              - value: 85.0

  # An example config for filter processor: drop hw.status{hw.state="ok"} data points to reduce metric cardinality.
  # NOTE: If enabled in the default pipeline, this also affects the
  # intelxpuinfo exporter: healthy components will have no active status entry.
  filter/ok_status:
    metrics:
      datapoint:
        - 'metric.name == "hw.status" and attributes["hw.state"] == "ok"'

exporters:
  intelxpuinfo:
    # Only unix domain socket is allowed.
    # If `endpoint` is unset, `$XDG_RUNTIME_DIR/intelxpuinfo.sock` is used instead.
    #endpoint: "/run/xpumd/intelxpuinfo.sock"
    hw_status_mappings:
      - health_domain: "memory"
        filters:
          - key: hw.type
            values: [memory]
        state_mapping:
          unknown:
            severity: unknown
          ok:
            severity: ok
          degraded:
            severity: warning
          critical:
            severity: critical
          replace:
            severity: critical
          "*":
            severity: warning
            message: "Unexpected memory health state, mapped to warning"
      # Default mapping (empty filters matches any data point not matched above):
      - health_domain: "{{ .hw_type }}"
        state_mapping:
          unknown:
            severity: unknown
          ok:
            severity: ok
          warning:
            severity: warning
          critical:
            severity: critical
          failed:
            severity: failed
          "*":
            severity: warning
  prometheus:
    endpoint: "127.0.0.1:8080"

extensions:

service:
  telemetry:
    logs:
      level: info
      #disable_stacktrace: true
  pipelines:
    metrics:
      receivers: [intelxpu]
      processors: [intelxpustatus]
      exporters: [intelxpuinfo,prometheus]
    logs:
      # "intel_crashlog" receiver can be added when its dir is present
      receivers: [intelxpu]
      exporters: [intelxpuinfo]
