dist:
  name: xpumd
  description: XPUM Daemon
  output_path: ./dist
  otelcol_version: 0.144.0
  version: 0.0.0
  # Enable CGO explicitly, as we are linking against external library
  # Ref: https://github.com/open-telemetry/opentelemetry-collector/tree/main/cmd/builder#cgo-disabled-by-default
  cgo_enabled: true

replaces:
  - github.com/intel/level-zero-go => ../level-zero-go
  - github.com/intel/xpumanager => ../

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.144.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusexporter v0.144.0
  - gomod: github.com/intel/xpumanager/exporter v0.0.0
    path: ./exporter
    name: intelxpuinfoexporter

receivers:
  - gomod: github.com/intel/xpumanager/receiver v0.0.0
    path: ./receiver
    name: intelxpureceiver

processors:
  - gomod: github.com/intel/xpumanager/processor v0.0.0
    path: ./processor
    name: intelxpustatus

extensions:
