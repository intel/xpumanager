GENERATOR:
  PackageName: levelzero
  PackageDescription: "Level Zero API bindings for Go"
  PackageLicense: |
    Copyright (C) 2019-2025 Intel Corporation

    SPDX-License-Identifier: MIT
  FlagGroups:
    - {name: "LDFLAGS", flags: ["-lze_loader"]}
  Includes:
    - ze_api.h
    - zes_api.h

PARSER:
  SourcesPaths:
    - levelzero/ze_api.h
    - levelzero/zes_api.h

TRANSLATOR:
  ConstRules:
  Rules:
    const:
      - {action: accept, from: "^ZE_RESULT_"}
      - {action: accept, from: "^ZES_"}
      - {action: ignore, from: "^ZES_STRUCTURE_TYPE_"}
      - {action: replace, from: "_FORCE_UINT32$", to: "_END_MARKER"}
      - {transform: export}
      # Deprecated consts from zes_api.h
      - {action: ignore, from: "^ZES_ENGINE_GROUP_MEDIA_(DE|EN)CODE_SINGLE$"}
      - {action: ignore, from: "^ZES_ENGINE_GROUP_3D_(SINGLE|RENDER_COMPUTE_ALL|ALL)$"}
      - {action: ignore, from: "^ZES_SCHED_MODE_COMPUTE_UNIT_DEBUG$"}
      - {action: ignore, from: "^ZES_VF_MANAGEMENT_EXP_VERSION_1_[01]$"}
    function:
      - {action: accept, from: "^zes[A-Z]"}
      - {transform: unexport}
      # Disable from zes_api.h
      - {action: ignore, from: "^zesDriverGetExtensionFunctionAddress$"}
      # Deprecated functions from zes_api.h
      - {action: ignore, from: "^zesDeviceEnumActiveVFExp$"}
      - {action: ignore, from: "^zesDeviceGetCardPowerDomain$"}
      - {action: ignore, from: "^zesFrequencyOcGetCapabilities$"}
      - {action: ignore, from: "^zesFrequencyOc(Get|Set)FrequencyTarget$"}
      - {action: ignore, from: "^zesFrequencyOc(Get|Set)IccMax$"}
      - {action: ignore, from: "^zesFrequencyOc(Get|Set)Mode$"}
      - {action: ignore, from: "^zesFrequencyOc(Get|Set)VoltageTarget$"}
      - {action: ignore, from: "^zesFrequencyOc(Get|Set)TjMax$"}
      - {action: ignore, from: "^zesPower(Get|Set)Limits$"}
      - {action: ignore, from: "^zesSchedulerSetComputeUnitDebugMode$"}
      - {action: ignore, from: "^zesVFManagementGetVFCapabilitiesExp$"}
      - {action: ignore, from: "^zesVFManagementGetVFEngineUtilizationExp$"}
      - {action: ignore, from: "^zesVFManagementGetVFMemoryUtilizationExp$"}
      - {action: ignore, from: "^zesVFManagementGetVFPropertiesExp$"}
      - {action: ignore, from: "^zesVFManagementSetVFTelemetryModeExp$"}
      - {action: ignore, from: "^zesVFManagementSetVFTelemetrySamplingIntervalExp$"}
    type:
      - {action: accept, from: "^ze_result_t$"}
      - {action: accept, from: "^ze_device_properties_t$"}
      - {action: accept, from: "^ze_device_uuid_t$"}
      - {action: accept, from: "^zes_[a-z0-9_]*_t$"}
      - {action: ignore, from: "^zes_base_[a-z_]*_t$"}
      - {action: ignore, from: "^zes_[a-z_]*_handle_t$"}
      - {action: ignore, from: "^zes_structure_type_t$"}
      - {action: replace, from: "_t$"}
      - {transform: export}
      - {transform: unexport, from: "Zes_device_properties$"}
      - {transform: unexport, from: "Ze_device_properties$"}
      - {load: snakecase}
      - {transform: unexport, from: "[A-Za-z0-9]*Handle$"}
      # Deprecated types from zes_api.h
      - {action: ignore, from: "^zes_oc_mode_t$"}
      - {action: ignore, from: "^zes_oc_capabilities_t$"}
      - {action: ignore, from: "^zes_mem_ext_bandwidth_t$"}
      - {action: ignore, from: "^zes_power_sustained_limit_t$"}
      - {action: ignore, from: "^zes_power_burst_limit_t$"}
      - {action: ignore, from: "^zes_power_peak_limit_t$"}
      - {action: ignore, from: "^zes_vf_info_mem_type_exp_flag[s]?_t$"}
      - {action: ignore, from: "^zes_vf_info_util_exp_flag[s]?_t$"}
      - {action: ignore, from: "^zes_vf_exp_properties_t$"}
      - {action: ignore, from: "^zes_vf_util_mem_exp_t$"}
      - {action: ignore, from: "^zes_vf_util_engine_exp_t$"}
      - {action: ignore, from: "^zes_vf_exp_capabilities_t$"}
  PtrTips:
    function:
      # Specific tips
      - {target: "^zesDriverGet$", tips: [ref, arr]}
      - {target: "^zesDriverGetExtensionProperties$", tips: [ref, ref, arr]}
      - {target: "^zesDeviceGet$", tips: [ref, ref, arr]}
      - {target: "^zesDeviceEnum", tips: [ref, ref, arr]}
      - {target: "^zesDeviceProcessesGetState$", tips: [ref, ref, arr]}
      - {target: "^zesDevicePciGetBars$", tips: [ref, ref, arr]}
      - {target: "^zesDiagnosticsGetTests$", tips: [ref, ref, arr]}
      - {target: "^zesDiagnosticsRunTests$", tips: [ref, ref, ref, arr]}
      - {target: "^zesDriverEventListen(Ex)?", tips: [ref, ref, ref, arr, ref, arr]}
      - {target: "^zesFabricPortGetMultiPortThroughput$", tips: [ref, ref, arr, ref]}
      - {target: "^zesFrequencyGetAvailableClocks$", tips: [ref, ref, arr]}
      - {target: "^zesPower(Get|Set)LimitsExt$", tips: [ref, ref, arr]}
      - {target: "^zesRasGetStateExp$", tips: [ref, ref, arr]}
      - {target: "^zesEngineGetActivityExt$", tips: [ref, ref, arr]}
      - {target: "^zesDeviceGetSubDevicePropertiesExp$", tips: [ref, ref, arr]}
      - {target: "^zesVFManagementGetVF(Engine|Memory)UtilizationExp2$", tips: [ref, ref, arr]}
      # Default tip, everything is ref
      - {target: ., tips: [ref, ref, ref, ref, ref, ref, ref, ref, ref, ref]}
  TypeTips:
    type:
      - {target: "^zes_[a-z_]*_handle", self: raw}
  MemTips:
    - {target: ., self: raw}
