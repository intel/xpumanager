# https://github.com/open-telemetry/opentelemetry-collector/blob/main/cmd/mdatagen/metadata-schema.yaml
type: sysman

status:
  class: scraper
  stability:
    development: [metrics]
  codeowners:
    active: [marquiz, eero-t]

sem_conv_version: 1.38.0

attributes:
  aggregation:
    description: Aggregation type for the metric.
    type: string
    enum:
      - min
      - max
      - avg
  com.intel.speed.throttle_reason:
    description: Reason for the hardware component speed throttling.
    type: string
  com.intel.subdevice_id:
    description: Subdevice ID of the hardware component.
    type: string
  hw.firmware_version:
    description: Firmware version of the hardware component. Comma-separated list of `<id>:<name>:<subdevice_id>:<version>`, where `<version>` is URL-encoded.
    type: string
  hw.frequency.domain:
    description: The frequency domain (gpu, memory, media...).
    type: string
  hw.id:
    description: Unique identifier for the hardware component.
    type: string
  hw.limit_type:
    description: Type of limit.
    type: string
  hw.memory.location:
    description: Location of the memory (device, system...).
    type: string
  hw.memory.type:
    description: Type of the memory.
    type: string
  hw.model:
    description: Model name of the hardware component.
    type: string
  hw.name:
    description: An easily-recognizable name for the hardware component.
    type: string
  hw.parent:
    description: Unique identifier for the parent component.
    type: string
  hw.sensor_location:
    description: Location of the sensor.
    type: string
  hw.serial_number:
    description: Serial number of the hardware component.
    type: string
  hw.state:
    description: Current state of the hardware component.
    type: string
  hw.type:
    description: Type of the hardware component.
    type: string
    enum:
      - frequency
      - gpu
      - memory
      - temperature
  hw.vendor:
    description: Vendor name of the hardware component.
    type: string
  pci.bdf:
    description: PCI BDF (`<domain>:<bus>:<device>.<function>`) for the device.
    type: string
  pci.device_id:
    description: PCI device ID of the device.
    type: string
  pci.vendor_id:
    description: PCI vendor ID of the device.
    type: string
  sample.status:
    description: Status of the samples.
    type: string
    enum:
      - collected
      - dropped
  statistic:
    description: Statistic type for the metric.
    type: string
    enum:
      - min
      - max

metrics:
  hw.energy:
    enabled: true
    description: Energy consumed by the hardware component.
    stability:
      level: development
    unit: "J"
    sum:
      value_type: double
      monotonic: true
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.name, hw.parent, hw.sensor_location, com.intel.subdevice_id]
  hw.frequency:
    enabled: true
    description: Operating frequency of the hardware component.
    stability:
      level: development
    unit: "Hz"
    gauge:
      value_type: int
    attributes: [hw.id, hw.frequency.domain, hw.name, hw.parent, com.intel.subdevice_id, aggregation]
  hw.frequency.limit:
    enabled: true
    description: Frequency limit in Hertz.
    stability:
      level: development
    unit: "Hz"
    gauge:
      value_type: int
    attributes: [hw.id, hw.frequency.domain, hw.name, hw.parent, com.intel.subdevice_id, hw.limit_type]
  hw.frequency.request:
    enabled: true
    description: Requested operating frequency.
    stability:
      level: development
    unit: "Hz"
    gauge:
      value_type: int
    attributes: [hw.id, hw.frequency.domain, hw.name, hw.parent, com.intel.subdevice_id]
  hw.frequency.samples:
    enabled: true
    description: Number of frequency samples during the last collection interval.
    stability:
      level: development
    unit: "{count}"
    gauge:
      value_type: int
    attributes: [hw.id, hw.frequency.domain, hw.name, hw.parent, com.intel.subdevice_id, sample.status]
  hw.frequency.throttle_status:
    enabled: true
    description: Hardware component frequency throttle status.
    stability:
      level: development
    unit: "1"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.frequency.domain, hw.name, hw.parent, com.intel.subdevice_id, com.intel.speed.throttle_reason]
  hw.gpu.info:
    enabled: true
    description: Information about the GPU device.
    stability:
      level: development
    unit: "1"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.model, hw.name, hw.serial_number, hw.vendor, hw.firmware_version, pci.bdf, pci.device_id, pci.vendor_id]
  hw.memory.size:
    enabled: true
    description: Size of the memory.
    stability:
      level: development
    unit: "By"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.memory.location, hw.memory.type, hw.name, hw.parent, com.intel.subdevice_id]
  hw.memory.usage:
    enabled: true
    description: Memory used.
    stability:
      level: development
    unit: "By"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.memory.location, hw.memory.type, hw.name, hw.parent, com.intel.subdevice_id]
  hw.power:
    enabled: true
    description: Instantaneous power usage of the hardware component.
    stability:
      level: development
    unit: "W"
    gauge:
      value_type: double
    attributes: [hw.id, hw.name, hw.parent, hw.sensor_location, com.intel.subdevice_id]
  hw.status:
    enabled: true
    description: The operational status of the hardware component.
    stability:
      level: development
    unit: "1"
    sum:
      value_type: int
      monotonic: false
      aggregation_temporality: cumulative
    attributes: [hw.id, hw.state, hw.name, hw.type, hw.parent, com.intel.subdevice_id]
  hw.temperature:
    enabled: true
    description: Temperature of the hardware component in degrees Celsius.
    stability:
      level: development
    unit: "Cel"
    gauge:
      value_type: double
    attributes: [hw.id, hw.name, hw.parent, hw.sensor_location, statistic, com.intel.subdevice_id]

tests:
  # TODO: explore using a stub l0 driver for enabling lifecycle tests (for
  # environment without real target hardware)
  skip_lifecycle: true
  skip_shutdown: true
