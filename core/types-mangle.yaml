#
# Config file for the hack/types-mangle tool.
#
structs:
  - name: "*"
    fields:
      - name: Pad_cgo_0
        newName: _
      - name: Stype
        newName: stype
      - name: PNext
        newName: pnext
  - name: DeviceProperties
    fields:
      - name: Flags
        newType: DevicePropertyFlag
      - name: Name
        typeAssert: "[256]int8"
        newType: StringProperty256
  - name: DeviceUuid
    fields:
      - name: id
        typeAssert: "[16]uint8"
        newType: uuid.UUID
