name: CI Checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: intelsb.prod.amr.dind
    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Checkout level-zero-go
      uses: actions/checkout@v6
      with:
        repository: marquiz/level-zero-go
        path: ./level-zero-go
        token: ${{ secrets.LEVEL_ZERO_GO_TOKEN }}

    - name: Golangci-lint
      run: |
        docker run --rm -v $(pwd):/app -w /app \
        golangci/golangci-lint:latest \
        /bin/sh -c \
        "apt-get update && apt-get install -y libze-dev && golangci-lint run"

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Verify generated assets
      run: |
        ./scripts/generate.sh
        if ! git diff --quiet; then
          echo "Generated assets are out of date. Please run make generate and commit the changes."
          git --no-pager diff
          exit 1
        fi
