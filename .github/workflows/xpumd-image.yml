name: Linux - xpumd container images

on:
  push:
    branches:
      - main
      - dev
      - v2*
    tags:
      # Note: 'sed' clauses in 'versiontags' need to remove prefixes for these
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-*
      - xpumd/v[0-9]+.[0-9]+.[0-9]+
      - xpumd/v[0-9]+.[0-9]+.[0-9]+-*
  pull_request:
    paths:
      - 'xpumd/**'
      - '.github/workflows/xpumd-image.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ${{ fromJson(vars.RUNS_ON_BUILD_AND_PUSH) }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      with:
        cosign-release: 'v2.6.1'

    - name: Setup Helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

    - name: Docker login
      if: ${{ github.event_name == 'push' }}
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Set image tags
      id: versiontags
      run: |
        # Chart/app versions cannot contain '/' => remove such prefixes.
        # Chart version is strict SemVer, so it needs to start with a valid number.
        # Daemonset image tag defaults to appversion, so those need to match.
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          tag="pr-${{ github.event.pull_request.number }}"
        else
          tag=$(echo "${{ github.ref_name }}" | sed 's!^xpumd/!!')
        fi
        if [ "${{ github.ref_type }}" = "tag" ]; then
          chart_version=$(echo "${{ github.ref_name }}" | sed -e 's!^xpumd/!!' -e 's!^v!!')
        else
          chart_version="0.0.0-${{ github.ref_name }}"
        fi

        echo "IMAGE_TAG=ghcr.io/${{ github.repository }}/xpumd:${tag}" >> $GITHUB_ENV
        echo "CHART_VERSION=${chart_version}" >> $GITHUB_ENV
        echo "CHART_APP_VERSION=${tag}" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      if: vars.NO_SETUP_BUILDX_BUILD_AND_PUSH != 'true'
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      with:
        driver-opts: |
          "env.http_proxy=${{ vars.HTTP_PROXY }}"
          "env.https_proxy=${{ vars.HTTPS_PROXY }}"
          "env.no_proxy=${{ vars.NO_PROXY }}"


    - name: Build and push image
      id: build_and_push
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ./xpumd
        file: ./xpumd/Dockerfile
        push: ${{ github.event_name == 'push' }}
        tags: ${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          http_proxy=${{ vars.HTTP_PROXY }}
          https_proxy=${{ vars.HTTPS_PROXY }}
          no_proxy=${{ vars.NO_PROXY }}

    - name: Sign image
      if: ${{ github.event_name == 'push' }}
      env:
        DIGEST: ${{ steps.build_and_push.outputs.digest }}
      run: cosign sign --yes ${{ env.IMAGE_TAG }}@${{ steps.build_and_push.outputs.digest }}

    - name: Run Trivy image scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ env.IMAGE_TAG }}
        list-all-pkgs: true
        format: json
        output: trivy-report.json

    - name: Print Trivy report in human-readable format
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: convert
        image-ref: trivy-report.json
        format: table

    - name: Convert Trivy report to CSV format
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: convert
        image-ref: trivy-report.json
        format: template
        template: "@.github/workflows/trivy-csv.tpl"
        output: trivy-xpumd-image-report.csv

    - name: Upload Trivy CSV report as artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: trivy-xpumd-image-report
        path: trivy-xpumd-image-report.csv

    - name: Helm login
      if: github.event_name == 'push'
      run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Package Helm chart
      if: github.event_name == 'push'
      run: |
        helm package ./xpumd/charts/xpumd/ --version ${{ env.CHART_VERSION }} --app-version ${{ env.CHART_APP_VERSION }}

    - name: Push Helm chart
      if: github.event_name == 'push'
      run: helm push xpumd-*.tgz oci://ghcr.io/${{ github.repository }}/charts/

  integration-test:
    runs-on: ${{ fromJson(vars.RUNS_ON_INTEGRATION_TEST) }}
    timeout-minutes: 20
    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Docker Buildx
      if: vars.NO_SETUP_BUILDX_INTEGRATION_TEST != 'true'
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      with:
        driver-opts: |
          "env.http_proxy=${{ vars.HTTP_PROXY }}"
          "env.https_proxy=${{ vars.HTTPS_PROXY }}"
          "env.no_proxy=${{ vars.NO_PROXY }}"

    - name: Build image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ./xpumd
        file: ./xpumd/Dockerfile
        load: true
        tags: xpumd:integration-test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          http_proxy=${{ vars.HTTP_PROXY }}
          https_proxy=${{ vars.HTTPS_PROXY }}
          no_proxy=${{ vars.NO_PROXY }}

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: xpumd/test/integration/go.mod

    - name: Run integration tests
      working-directory: xpumd
      run: |
        scripts/run-integration-tests.sh \
          --image-repository=xpumd \
          --image-tag=integration-test \
          --kind-load-image
