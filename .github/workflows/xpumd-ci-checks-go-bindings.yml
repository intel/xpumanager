name: Linux - Level-Zero Go bindings

on:
  push:
    branches:
      - main
      - dev
      - v2*
  pull_request:
    paths:
      - 'xpumd/**'
      - '.github/workflows/xpumd-ci-checks-go-bindings.yml'

permissions:
  contents: read

jobs:
  checks:
    runs-on: ${{ fromJson(vars.RUNS_ON) }}
    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Build examples
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      with:
        context: ./xpumd/receiver/internal/level-zero-go
        file: ./xpumd/receiver/internal/level-zero-go/examples/list-sysman/Dockerfile
