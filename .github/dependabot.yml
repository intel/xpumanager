version: 2
updates:
  - package-ecosystem: "github-actions"
    target-branch: main
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/tools"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/processor"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/exporter"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/receiver"
    schedule:
      interval: "weekly"
