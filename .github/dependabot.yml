  - package-ecosystem: "gomod"
    directory: "/xpumd"
    schedule:
      interval: "weekly"
    groups:
      otel-collector:
        patterns:
          - "go.opentelemetry.io/collector/*"
  - package-ecosystem: "gomod"
    directory: "/xpumd/tools"
    schedule:
      interval: "weekly"
    groups:
      otel-collector:
        patterns:
          - "go.opentelemetry.io/collector/*"
  - package-ecosystem: "gomod"
    directory: "/xpumd/processor"
    schedule:
      interval: "weekly"
    groups:
      otel-collector:
        patterns:
          - "go.opentelemetry.io/collector/*"
  - package-ecosystem: "gomod"
    directory: "/xpumd/exporter"
    schedule:
      interval: "weekly"
    groups:
      otel-collector:
        patterns:
          - "go.opentelemetry.io/collector/*"
  - package-ecosystem: "gomod"
    directory: "/xpumd/receiver"
    schedule:
      interval: "weekly"
    groups:
      otel-collector:
        patterns:
          - "go.opentelemetry.io/collector/*"
