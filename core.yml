GENERATOR:
  PackageName: core
  PackageDescription: "Level Zero Core API bindings for Go"
  PackageLicense: |
    Copyright (C) 2019-2025 Intel Corporation

    SPDX-License-Identifier: MIT
  FlagGroups:
    - {name: "LDFLAGS", flags: ["-lze_loader"]}
  Includes:
    - ze_api.h

PARSER:
  SourcesPaths:
    - levelzero/ze_api.h

TRANSLATOR:
  ConstRules:
  Rules:
    const:
      - {action: accept, from: "^ZE_RESULT_"}
      - {action: accept, from: "^ZE_DEVICE_PROPERTY_FLAG_"}
      - {action: replace, from: "^ZE_"}
      - {transform: export}
    function:
    type:
      - {action: accept, from: "^ze_result_t$"}
      - {action: accept, from: "^ze_device_properties_t$"}
      - {action: accept, from: "^ze_device_uuid_t$"}
      - {action: accept, from: "^ze_device_property_flag_t$"}
      - {action: replace, from: "^ze_"}
      - {action: replace, from: "_t$"}
      - {transform: export}
      - {transform: unexport, from: "Device_properties$"}
      - {load: snakecase}
  PtrTips:
  TypeTips:
    type:
      - {target: "^zes_[a-z_]*_handle", self: raw}
  MemTips:
    - {target: ., self: raw}
